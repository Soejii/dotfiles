[cship]
lines = [
  "$starship_prompt",
  "$cship.model $cship.cost $cship.context_bar $cship.usage_limits",
]

[cship.model]
symbol = "箚쭛 "
style  = "bold fg:#cba6f7"
format = "[$symbol$value]($style)"

[cship.cost]
symbol             = "箚꼮 "
style              = "fg:#a6e3a1"
format             = "[$symbol$value]($style)"
warn_threshold     = 2.0
warn_style         = "fg:#f9e2af"
critical_threshold = 5.0
critical_style     = "bold fg:#f38ba8"

[cship.context_bar]
symbol             = "箚뜘 "
format             = "[$symbol$value]($style)"
width              = 12
style              = "fg:#89dceb"
warn_threshold     = 40.0
warn_style         = "fg:#fab387"
critical_threshold = 70.0
critical_style     = "bold fg:#f38ba8"

[cship.usage_limits]
ttl                = 30
five_hour_format   = "箚쪛 5h {pct}% ({reset})"
seven_day_format   = "箚꺆 7d {pct}% ({reset})"
separator          = " "
style              = "fg:#89b4fa"
warn_threshold     = 70.0
warn_style         = "fg:#f9e2af"
critical_threshold = 90.0
critical_style     = "bold fg:#f38ba8"
